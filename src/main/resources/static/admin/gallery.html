<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/admin/css/admin.css" rel="stylesheet">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h4><i class="fas fa-cog me-2"></i>Admin Panel</h4>
            <small>Qualique Management</small>
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a></li>
            <li><a href="categories.html"><i class="fas fa-th-large"></i><span>Categories</span></a></li>
            <li><a href="products.html"><i class="fas fa-box"></i><span>Products</span></a></li>
            <li><a href="brands.html"><i class="fas fa-star"></i><span>Brands</span></a></li>
            <li><a href="gallery.html" class="active"><i class="fas fa-images"></i><span>Gallery</span></a></li>
            <li><a href="inquiries.html"><i class="fas fa-envelope"></i><span>Inquiries</span></a></li>
            <li><a href="company.html"><i class="fas fa-building"></i><span>Company Info</span></a></li>
            <li><a href="/" target="_blank"><i class="fas fa-external-link-alt"></i><span>View Website</span></a></li>
            <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="admin-header">
            <button class="menu-toggle"><i class="fas fa-bars"></i></button>
            <h5>Manage Gallery</h5>
            <div class="user-dropdown dropdown">
                <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle" data-bs-toggle="dropdown">
                    <i class="fas fa-user-circle fa-2x me-2 text-primary"></i>
                    <span id="user-name">Admin</span>
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                </ul>
            </div>
        </header>

        <div class="content-area">
            <div class="data-card">
                <div class="data-card-header">
                    <h5>Gallery Images</h5>
                    <button class="btn btn-primary" onclick="openAddModal()">
                        <i class="fas fa-plus me-2"></i>Add Image
                    </button>
                </div>
                <div class="data-card-body p-4">
                    <div class="row" id="gallery-container">
                        <div class="col-12 text-center py-4">
                            <div class="spinner-border text-primary" role="status"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="galleryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-title">Add Image</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="gallery-form">
                        <input type="hidden" id="image-id">
                        <div class="form-group">
                            <label>Title *</label>
                            <input type="text" class="form-control" id="image-title" required>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea class="form-control" id="image-description" rows="2"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select class="form-control" id="image-category">
                                <option value="GENERAL">General</option>
                                <option value="PRODUCTS">Products</option>
                                <option value="OFFICE">Office</option>
                                <option value="TEAM">Team</option>
                                <option value="EVENTS">Events</option>
                                <option value="CERTIFICATES">Certificates</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Image *</label>
                            <!-- Image Source Toggle -->
                            <div class="btn-group w-100 mb-2" role="group">
                                <input type="radio" class="btn-check" name="imageSource" id="imageSourceUpload" checked onchange="toggleImageSource('upload')">
                                <label class="btn btn-outline-primary btn-sm" for="imageSourceUpload">
                                    <i class="fas fa-upload me-1"></i>Upload File
                                </label>
                                <input type="radio" class="btn-check" name="imageSource" id="imageSourceUrl" onchange="toggleImageSource('url')">
                                <label class="btn btn-outline-primary btn-sm" for="imageSourceUrl">
                                    <i class="fas fa-link me-1"></i>External URL
                                </label>
                            </div>
                            <!-- File Upload -->
                            <div id="imageUploadDiv">
                                <input type="file" class="form-control" id="image-file" accept="image/*" onchange="previewImage(this, 'image-preview')">
                            </div>
                            <!-- URL Input -->
                            <div id="imageUrlDiv" style="display: none;">
                                <input type="url" class="form-control" id="image-external-url" placeholder="https://example.com/image.jpg" onchange="previewImageFromUrl()">
                                <small class="text-muted">Paste image URL from Imgur, imgbb, or any image host</small>
                            </div>
                            <input type="hidden" id="image-url">
                            <div class="image-preview" id="image-preview">
                                <i class="fas fa-image fa-3x text-muted"></i>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Display Order</label>
                                    <input type="number" class="form-control" id="image-order" value="0">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group pt-4">
                                    <div class="form-check">
                                        <input type="checkbox" class="form-check-input" id="image-active" checked>
                                        <label class="form-check-label" for="image-active">Active</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveImage()" id="save-btn">
                        <i class="fas fa-save me-2"></i>Save Image
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/admin/js/admin.js"></script>
    <script>
        let galleryModal;
        
        async function loadGallery() {
            const result = await apiCall('/gallery');
            const container = document.getElementById('gallery-container');
            
            if (result && result.success && result.data.length > 0) {
                container.innerHTML = result.data.map(img => `
                    <div class="col-lg-3 col-md-4 col-sm-6 mb-4">
                        <div class="card h-100">
                            <img src="${img.imageUrl}" class="card-img-top" alt="${img.title}" style="height: 180px; object-fit: cover;">
                            <div class="card-body">
                                <h6 class="card-title">${img.title}</h6>
                                <span class="badge bg-secondary">${img.galleryCategory}</span>
                                <span class="${img.active ? 'badge-active' : 'badge-inactive'} ms-1">${img.active ? 'Active' : 'Inactive'}</span>
                            </div>
                            <div class="card-footer bg-white border-0">
                                <button class="btn-action btn-edit me-1" onclick="editImage(${img.id})">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn-action btn-delete" onclick="deleteImage(${img.id})">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = `
                    <div class="col-12 text-center py-4">
                        <i class="fas fa-images fa-3x text-muted mb-3"></i>
                        <p class="text-muted">No gallery images yet. Click "Add Image" to upload one.</p>
                    </div>
                `;
            }
        }
        
        function openAddModal() {
            document.getElementById('modal-title').textContent = 'Add Image';
            document.getElementById('gallery-form').reset();
            document.getElementById('image-id').value = '';
            document.getElementById('image-active').checked = true;
            document.getElementById('image-preview').innerHTML = '<i class="fas fa-image fa-3x text-muted"></i>';
            // Reset image source toggle
            document.getElementById('imageSourceUpload').checked = true;
            document.getElementById('imageUploadDiv').style.display = 'block';
            document.getElementById('imageUrlDiv').style.display = 'none';
            document.getElementById('image-external-url').value = '';
            galleryModal.show();
        }
        
        async function editImage(id) {
            const result = await apiCall('/gallery');
            if (result && result.success) {
                const img = result.data.find(i => i.id === id);
                if (img) {
                    document.getElementById('modal-title').textContent = 'Edit Image';
                    document.getElementById('image-id').value = img.id;
                    document.getElementById('image-title').value = img.title;
                    document.getElementById('image-description').value = img.description || '';
                    document.getElementById('image-category').value = img.galleryCategory;
                    document.getElementById('image-order').value = img.displayOrder || 0;
                    document.getElementById('image-active').checked = img.active;
                    document.getElementById('image-url').value = img.imageUrl;
                    document.getElementById('image-preview').innerHTML = `<img src="${img.imageUrl}" alt="Preview">`;
                    
                    // If image URL is external, switch to URL mode
                    if (img.imageUrl && (img.imageUrl.startsWith('http://') || img.imageUrl.startsWith('https://'))) {
                        document.getElementById('imageSourceUrl').checked = true;
                        document.getElementById('imageUploadDiv').style.display = 'none';
                        document.getElementById('imageUrlDiv').style.display = 'block';
                        document.getElementById('image-external-url').value = img.imageUrl;
                    } else {
                        document.getElementById('imageSourceUpload').checked = true;
                        document.getElementById('imageUploadDiv').style.display = 'block';
                        document.getElementById('imageUrlDiv').style.display = 'none';
                        document.getElementById('image-external-url').value = '';
                    }
                    
                    galleryModal.show();
                }
            }
        }
        
        async function saveImage() {
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Saving...';
            
            try {
                // Check if using URL or file upload
                const externalUrl = document.getElementById('image-external-url').value;
                const file = document.getElementById('image-file').files[0];
                let imageUrl = document.getElementById('image-url').value;
                
                // If external URL is provided, use it directly
                if (externalUrl) {
                    imageUrl = externalUrl;
                } else if (file) {
                    const uploadResult = await uploadFile(file);
                    if (uploadResult.success) {
                        imageUrl = uploadResult.data;
                    }
                }
                
                if (!imageUrl) {
                    showNotification('Please select an image', 'warning');
                    return;
                }
                
                const data = {
                    title: document.getElementById('image-title').value,
                    description: document.getElementById('image-description').value,
                    galleryCategory: document.getElementById('image-category').value,
                    imageUrl: imageUrl,
                    displayOrder: parseInt(document.getElementById('image-order').value) || 0,
                    active: document.getElementById('image-active').checked
                };
                
                const id = document.getElementById('image-id').value;
                const result = id 
                    ? await apiCall(`/gallery/${id}`, 'PUT', data)
                    : await apiCall('/gallery', 'POST', data);
                
                if (result && result.success) {
                    showNotification(result.message);
                    galleryModal.hide();
                    loadGallery();
                } else {
                    showNotification(result?.message || 'Error saving image', 'danger');
                }
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save me-2"></i>Save Image';
            }
        }
        
        async function deleteImage(id) {
            if (await confirmDialog('Are you sure you want to delete this image?')) {
                const result = await apiCall(`/gallery/${id}`, 'DELETE');
                if (result && result.success) {
                    showNotification('Image deleted successfully');
                    loadGallery();
                }
            }
        }
        
        function previewImage(input, previewId) {
            const preview = document.getElementById(previewId);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        
        // Toggle between file upload and URL input
        function toggleImageSource(source) {
            const uploadDiv = document.getElementById('imageUploadDiv');
            const urlDiv = document.getElementById('imageUrlDiv');
            const fileInput = document.getElementById('image-file');
            const urlInput = document.getElementById('image-external-url');
            
            if (source === 'upload') {
                uploadDiv.style.display = 'block';
                urlDiv.style.display = 'none';
                urlInput.value = '';
            } else {
                uploadDiv.style.display = 'none';
                urlDiv.style.display = 'block';
                fileInput.value = '';
            }
        }
        
        // Convert Google Drive share link to proxy URL
        function convertToDirectUrl(url) {
            // Google Drive share link pattern: https://drive.google.com/file/d/FILE_ID/view...
            const driveMatch = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
            if (driveMatch) {
                // Use our backend proxy to fetch Google Drive images
                return `/api/public/gdrive-image?id=${driveMatch[1]}`;
            }
            
            // Google Drive open link pattern: https://drive.google.com/open?id=FILE_ID
            const openMatch = url.match(/drive\.google\.com\/open\?id=([a-zA-Z0-9_-]+)/);
            if (openMatch) {
                return `/api/public/gdrive-image?id=${openMatch[1]}`;
            }
            
            // Already a direct link or other URL
            return url;
        }
        
        // Preview image from URL
        function previewImageFromUrl() {
            let url = document.getElementById('image-external-url').value.trim();
            const preview = document.getElementById('image-preview');
            
            if (url) {
                // Auto-convert Google Drive links
                const originalUrl = url;
                url = convertToDirectUrl(url);
                
                // Update the input field with converted URL
                if (url !== originalUrl) {
                    document.getElementById('image-external-url').value = url;
                }
                
                preview.innerHTML = `<img src="${url}" alt="Preview" onerror="this.parentElement.innerHTML='<i class=\\'fas fa-exclamation-triangle fa-3x text-warning\\'></i><br><small class=\\'text-danger\\'>Image failed to load. Make sure file is shared as \\'Anyone with the link\\'</small>'">`;
                document.getElementById('image-url').value = url;
            } else {
                preview.innerHTML = '<i class="fas fa-image fa-3x text-muted"></i>';
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            galleryModal = new bootstrap.Modal(document.getElementById('galleryModal'));
            loadGallery();
        });
    </script>
</body>
</html>
