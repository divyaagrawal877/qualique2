<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brands - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/admin/css/admin.css" rel="stylesheet">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h4><i class="fas fa-cog me-2"></i>Admin Panel</h4>
            <small>Qualique Management</small>
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a></li>
            <li><a href="categories.html"><i class="fas fa-th-large"></i><span>Categories</span></a></li>
            <li><a href="products.html"><i class="fas fa-box"></i><span>Products</span></a></li>
            <li><a href="brands.html" class="active"><i class="fas fa-star"></i><span>Brands</span></a></li>
            <li><a href="gallery.html"><i class="fas fa-images"></i><span>Gallery</span></a></li>
            <li><a href="inquiries.html"><i class="fas fa-envelope"></i><span>Inquiries</span></a></li>
            <li><a href="company.html"><i class="fas fa-building"></i><span>Company Info</span></a></li>
            <li><a href="/" target="_blank"><i class="fas fa-external-link-alt"></i><span>View Website</span></a></li>
            <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="admin-header">
            <button class="menu-toggle"><i class="fas fa-bars"></i></button>
            <h5>Manage Brands</h5>
            <div class="user-dropdown dropdown">
                <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle" data-bs-toggle="dropdown">
                    <i class="fas fa-user-circle fa-2x me-2 text-primary"></i>
                    <span id="user-name">Admin</span>
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                </ul>
            </div>
        </header>

        <div class="content-area">
            <div class="data-card">
                <div class="data-card-header">
                    <h5>Brands List</h5>
                    <button class="btn btn-primary" onclick="openAddModal()">
                        <i class="fas fa-plus me-2"></i>Add Brand
                    </button>
                </div>
                <div class="data-card-body">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Logo</th>
                                <th>Name</th>
                                <th>Website</th>
                                <th>Products</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="brands-table">
                            <tr>
                                <td colspan="6" class="text-center py-4">
                                    <div class="spinner-border text-primary" role="status"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="brandModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-title">Add Brand</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="brand-form">
                        <input type="hidden" id="brand-id">
                        <div class="form-group">
                            <label>Brand Name *</label>
                            <input type="text" class="form-control" id="brand-name" required>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea class="form-control" id="brand-description" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Website URL</label>
                            <input type="url" class="form-control" id="brand-website" placeholder="https://www.example.com">
                        </div>
                        <div class="form-group">
                            <label>Logo Image</label>
                            <input type="file" class="form-control" id="brand-logo-file" accept="image/*" onchange="previewImage(this, 'logo-preview')">
                            <input type="hidden" id="brand-logo">
                            <div class="image-preview" id="logo-preview">
                                <i class="fas fa-image fa-3x text-muted"></i>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Display Order</label>
                                    <input type="number" class="form-control" id="brand-order" value="0">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group pt-4">
                                    <div class="form-check">
                                        <input type="checkbox" class="form-check-input" id="brand-active" checked>
                                        <label class="form-check-label" for="brand-active">Active</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveBrand()" id="save-btn">
                        <i class="fas fa-save me-2"></i>Save Brand
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/admin/js/admin.js"></script>
    <script>
        let brandModal;
        
        async function loadBrands() {
            const result = await apiCall('/brands');
            const tbody = document.getElementById('brands-table');
            
            if (result && result.success && result.data.length > 0) {
                tbody.innerHTML = result.data.map(brand => `
                    <tr>
                        <td>
                            <img src="${brand.logoUrl || 'https://placehold.co/50x50?text=' + brand.name.charAt(0)}" 
                                 class="product-img" alt="${brand.name}"
                                 onerror="this.src='https://placehold.co/50x50?text=${brand.name.charAt(0)}'">
                        </td>
                        <td><strong>${brand.name}</strong></td>
                        <td>${brand.websiteUrl ? `<a href="${brand.websiteUrl}" target="_blank">Visit</a>` : '-'}</td>
                        <td><span class="badge bg-primary">${brand.productCount || 0}</span></td>
                        <td>
                            <span class="${brand.active ? 'badge-active' : 'badge-inactive'}">
                                ${brand.active ? 'Active' : 'Inactive'}
                            </span>
                        </td>
                        <td>
                            <button class="btn-action btn-edit me-1" onclick="editBrand(${brand.id})">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn-action btn-delete" onclick="deleteBrand(${brand.id})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            } else {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center py-4">
                            <i class="fas fa-star fa-3x text-muted mb-3"></i>
                            <p class="text-muted">No brands yet. Click "Add Brand" to create one.</p>
                        </td>
                    </tr>
                `;
            }
        }
        
        function openAddModal() {
            document.getElementById('modal-title').textContent = 'Add Brand';
            document.getElementById('brand-form').reset();
            document.getElementById('brand-id').value = '';
            document.getElementById('brand-active').checked = true;
            document.getElementById('logo-preview').innerHTML = '<i class="fas fa-image fa-3x text-muted"></i>';
            brandModal.show();
        }
        
        async function editBrand(id) {
            const result = await apiCall('/brands');
            if (result && result.success) {
                const brand = result.data.find(b => b.id === id);
                if (brand) {
                    document.getElementById('modal-title').textContent = 'Edit Brand';
                    document.getElementById('brand-id').value = brand.id;
                    document.getElementById('brand-name').value = brand.name;
                    document.getElementById('brand-description').value = brand.description || '';
                    document.getElementById('brand-website').value = brand.websiteUrl || '';
                    document.getElementById('brand-order').value = brand.displayOrder || 0;
                    document.getElementById('brand-active').checked = brand.active;
                    document.getElementById('brand-logo').value = brand.logoUrl || '';
                    
                    if (brand.logoUrl) {
                        document.getElementById('logo-preview').innerHTML = `<img src="${brand.logoUrl}" alt="Preview">`;
                    }
                    
                    brandModal.show();
                }
            }
        }
        
        async function saveBrand() {
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Saving...';
            
            try {
                const logoFile = document.getElementById('brand-logo-file').files[0];
                let logoUrl = document.getElementById('brand-logo').value;
                
                if (logoFile) {
                    const uploadResult = await uploadFile(logoFile);
                    if (uploadResult.success) {
                        logoUrl = uploadResult.data;
                    }
                }
                
                const data = {
                    name: document.getElementById('brand-name').value,
                    description: document.getElementById('brand-description').value,
                    websiteUrl: document.getElementById('brand-website').value,
                    logoUrl: logoUrl,
                    displayOrder: parseInt(document.getElementById('brand-order').value) || 0,
                    active: document.getElementById('brand-active').checked
                };
                
                const id = document.getElementById('brand-id').value;
                const result = id 
                    ? await apiCall(`/brands/${id}`, 'PUT', data)
                    : await apiCall('/brands', 'POST', data);
                
                if (result && result.success) {
                    showNotification(result.message);
                    brandModal.hide();
                    loadBrands();
                } else {
                    showNotification(result?.message || 'Error saving brand', 'danger');
                }
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save me-2"></i>Save Brand';
            }
        }
        
        async function deleteBrand(id) {
            if (await confirmDialog('Are you sure you want to delete this brand?')) {
                const result = await apiCall(`/brands/${id}`, 'DELETE');
                if (result && result.success) {
                    showNotification('Brand deleted successfully');
                    loadBrands();
                }
            }
        }
        
        function previewImage(input, previewId) {
            const preview = document.getElementById(previewId);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            brandModal = new bootstrap.Modal(document.getElementById('brandModal'));
            loadBrands();
        });
    </script>
</body>
</html>
