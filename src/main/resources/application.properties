# Application Configuration
spring.application.name=qualique

# Server Configuration - Railway assigns PORT automatically
server.port=${PORT:8080}

# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================
# Railway provides DATABASE_URL for PostgreSQL (e.g., postgresql://user:pass@host:port/db)
# For local development, we use H2. For Railway, set SPRING_PROFILES_ACTIVE=prod

# Default: H2 for local development
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/qualique;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}

# H2 Console (for development only - automatically disabled when DATABASE_URL is set)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Hibernate will auto-detect dialect based on the database connection

# JWT Configuration
# IMPORTANT: Change this secret in production! Use environment variable: ${JWT_SECRET:default-secret}
jwt.secret=${JWT_SECRET:qualique-production-secret-key-change-this-in-production-minimum-256-bits}
jwt.expiration=3600000
# Token expires in 1 hour (was 24 hours) - more secure

# Security Settings
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${COOKIE_SECURE:false}
# Set COOKIE_SECURE=true in production with HTTPS (Railway provides HTTPS)

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
upload.path=${UPLOAD_PATH:./uploads}

# Static Resources
spring.web.resources.static-locations=classpath:/static/

# Logging - reduce verbosity in production
logging.level.com.qualique=${LOG_LEVEL:INFO}
logging.level.org.springframework=${SPRING_LOG_LEVEL:WARN}

# =============================================================================
# RAILWAY DEPLOYMENT NOTES
# =============================================================================
# Railway will automatically set these environment variables:
# - PORT: The port your app should listen on
# - DATABASE_URL: PostgreSQL connection string (if you add a PostgreSQL plugin)
#
# You should set these in Railway dashboard -> Variables:
# - JWT_SECRET: A strong random secret key (minimum 256 bits)
# - H2_CONSOLE_ENABLED: false (disable H2 console in production)
# - COOKIE_SECURE: true (Railway provides HTTPS)
# - DB_DRIVER: org.postgresql.Driver (when using PostgreSQL)
# - DB_USERNAME: (from Railway PostgreSQL plugin)
# - DB_PASSWORD: (from Railway PostgreSQL plugin)
# =============================================================================
