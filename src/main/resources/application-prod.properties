# =============================================================================
# PRODUCTION CONFIGURATION FOR RAILWAY
# =============================================================================
# Activate this profile by setting: SPRING_PROFILES_ACTIVE=prod in Railway

# PostgreSQL Database
# Railway provides DATABASE_URL in format: postgresql://user:password@host:port/database
# We need to convert it to JDBC format: jdbc:postgresql://host:port/database
spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.driverClassName=org.postgresql.Driver

# Let Hikari extract username/password from the JDBC URL
spring.datasource.hikari.jdbc-url=jdbc:${DATABASE_URL}

# Disable H2 console in production
spring.h2.console.enabled=false

# Production security settings
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# Production JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Reduce logging in production
logging.level.root=WARN
logging.level.com.qualique=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# Trust proxy headers (Railway uses a reverse proxy)
server.forward-headers-strategy=native
