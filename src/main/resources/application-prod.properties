# =============================================================================
# PRODUCTION CONFIGURATION FOR RAILWAY
# =============================================================================
# Activate this profile by setting: SPRING_PROFILES_ACTIVE=prod in Railway

# PostgreSQL Database - handled by DatabaseConfig.java which parses DATABASE_URL
# Railway provides DATABASE_URL in format: postgresql://user:password@host:port/database
# DatabaseConfig.java reads this and creates the DataSource with proper JDBC URL

# Disable H2 console in production
spring.h2.console.enabled=false

# Disable H2 auto-config in production (use PostgreSQL only)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.h2.H2ConsoleAutoConfiguration

# Production security settings
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# Production JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Reduce logging in production
logging.level.root=WARN
logging.level.com.qualique=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# Trust proxy headers (Railway uses a reverse proxy)
server.forward-headers-strategy=native
