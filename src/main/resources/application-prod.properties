# =============================================================================
# PRODUCTION CONFIGURATION FOR RAILWAY
# =============================================================================
# Activate this profile by setting: SPRING_PROFILES_ACTIVE=prod in Railway

# PostgreSQL Database
# Railway provides individual PostgreSQL environment variables:
# PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# Disable H2 console in production
spring.h2.console.enabled=false

# Production security settings
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# Production JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Reduce logging in production
logging.level.root=WARN
logging.level.com.qualique=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# Trust proxy headers (Railway uses a reverse proxy)
server.forward-headers-strategy=native
